kind = "mobile"
previewPath = "/"
title = "FactScan"
version = "1.0.0"
id = "artifacts/fact-scanner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22230

[services.development]
run = "pnpm --filter @workspace/fact-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fact-scanner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fact-scanner", "run", "serve" ]

[services.env]
PORT = "22230"
BASE_PATH = "/"
